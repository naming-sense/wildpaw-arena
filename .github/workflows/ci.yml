name: harness-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/web/package-lock.json
            server/gateway/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs flatbuffers-compiler libboost-system-dev
          git lfs install --local

      - name: Bootstrap
        run: ./scripts/bootstrap.sh

      - name: Check
        run: ./scripts/check.sh

      - name: Smoke
        run: ./scripts/smoke.sh
